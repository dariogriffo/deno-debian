name: Build deno for Debian

on:
  workflow_dispatch:
    inputs:
      deno_version:
        description: The version of deno to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, arm64, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'arm64'

permissions:
  contents: write

jobs:
  build-deno:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deno-debian
        uses: actions/checkout@v4

      - name: Build deno
        run: ./build.sh ${{ inputs.deno_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: |
            deno_*.deb
            denort_*.deb

  release-deno:
    name: (Draft-)Release deno for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-deno
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Publish Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            deno_*.deb
            denort_*.deb
          name: ${{ inputs.deno_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.deno_version }}-${{ inputs.build_version }}
          fail_on_unmatched_files: true
